; =============================== CONFIGS ===============================

[RP2040_FLASH]
build_flags =
  -D KNX_FLASH_SIZE=0x8000
  -D KNX_FLASH_OFFSET=0xF4000
  -D OPENKNX_FLASH_SIZE=0x4000
  -D OPENKNX_FLASH_OFFSET=0xFC000
  
; =============================== BASE ===============================

[RP2040] ; Base for Develop & Releases
extends = BASE, RP2040_2MB

upload_protocol = picotool
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#cc24cfef37ed22ca9f2a6aead28c2deb76c39f24
platform_packages = framework-arduinopico @ https://github.com/earlephilhower/arduino-pico/releases/download/5.4.4/rp2040-5.4.4.zip
board = rpipico ; is overwriteable in e.g. release or develop envs
board_build.core = earlephilhower
board_build.uf2 = enable
extra_scripts =
  ${env.extra_scripts}
  lib/OGM-Common/scripts/pio/patch_uf2.py
build_flags =
  ${BASE.build_flags}
  ${RP2040_FLASH.build_flags}
  -D PIO_FRAMEWORK_ARDUINO_ENABLE_RTTI

[RP2040_develop] ; Develop Only
extends = RP2040
build_type = debug
build_flags =
  -D OPENKNX_WAIT_FOR_SERIAL=5000
  ${OPENKNX_DEBUG.build_flags}
  ${RP2040.build_flags}

[RP2040_releases] ; Release Only
extends = RP2040
build_flags =
  -D OPENKNX_WATCHDOG
  ${RP2040.build_flags}


; ================================= FLASH SIZES =================================
; The initial 1,048,576 bytes (1MiB) have been preserved to maintain a consistent 
; flash partitioning and ensure compatibility. This is the minimum size!
; 
; On total flash size >1MB, only the file sytem profits from the additional space.
; Keep in mind that we need at the fs end at least 4096 bytes for EEPROM emulation.

; 16MB Flash
[RP2040_16MB]
board_upload.maximum_size = 16777216 ; 16MiB (Total size of the flash)
board_build.filesystem_size = 15724544 ; 15MiB (16MiB - 1MiB - 4096 bytes)

; 8MB Flash
[RP2040_8MB]
board_upload.maximum_size = 8388608 ; 8MiB (Total size of the flash)
board_build.filesystem_size = 7340032 ; 7MiB (8MiB - 1MiB - 4096 bytes)

; 4MB Flash
[RP2040_4MB]
board_upload.maximum_size = 4194304 ; 4MiB (Total size of the flash)
board_build.filesystem_size = 3141632 ; 3MiB (4MiB - 1MiB - 4096 bytes)

; 2MB Flash
[RP2040_2MB]
board_upload.maximum_size = 2097152 ; 2MiB (Total size of the flash)
board_build.filesystem_size = 1044480 ; 1MiB (2MiB - 1MiB - 4096 bytes)

; obsolete
[RP2040_UPLOAD_USB]
;upload_protocol = picotool
